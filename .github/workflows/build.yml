# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: "🚀 Build | EventStore = AxonServer"

on:
  push:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '.claude/**'
      - '.proophboard/**'
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '.claude/**'
      - '.proophboard/**'
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'zulu'
          cache: maven

      - name: 📦 Build with Maven
        run: mvn -B compile --file pom.xml

      - name: 🧪 Run unit tests
        env:
          AXON_AXONSERVER_ENABLED: false
        run: mvn -B test -DexcludedGroups=integration -Dsurefire.rerunFailingTestsCount=5 -Dfailsafe.rerunFailingTestsCount=5 --file pom.xml

      - name: 🧪 Run integration tests
        env:
          SPRING_PROFILES_ACTIVE: test,testcontainers,axonserver
          AXON_AXONSERVER_ENABLED: true
        run: mvn -B test -Dgroups=integration -Dsurefire.rerunFailingTestsCount=5 -Dfailsafe.rerunFailingTestsCount=5 --file pom.xml

#      - name: 📦 Package application
#        run: mvn -B package --file pom.xml

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
#      - name: 📈 Update dependency graph
#        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6