spring:
  datasource:
    hikari:
      maximum-pool-size: 5
      auto-commit: false

axon:
  axonserver:
    context: default
    enabled: ${AXON_AXONSERVER_ENABLED:false}

# Feature flags - allows you to enable/disable certain slices

maintenance:
  enabled: false

slices:
  creaturerecruitment.write.builddwelling:
    enabled: false
  creaturerecruitment.write.increaseavailablecreatures:
    enabled: false
  creaturerecruitment.write.recruitcreature:
    enabled: false
  creaturerecruitment.write.recruitcreaturedcb:
    enabled: false
  creaturerecruitment.read.getalldwellings:
    enabled: false
  creaturerecruitment.read.getdwellingbyid:
    enabled: false
  astrologers.write.proclaimweeksymbol:
    enabled: false
  astrologers.automation.whenweekstartedthenproclaimweeksymbol:
    enabled: false
  astrologers.automation.whenweeksymbolproclaimedthenincreasedwellingavailablecreatures:
    enabled: false
  calendar.write.startday:
    enabled: false
  calendar.write.finishday:
    enabled: false
  resourcespool.write.depositresources:
    enabled: false
  resourcespool.write.withdrawresources:
    enabled: false
  armies.write.addcreaturetoarmy:
    enabled: false
  armies.write.removecreaturefromarmy:
    enabled: false
  armies.read.getarmycreatures:
    enabled: false
  astrologers.read.getweeksymbol:
    enabled: false
  calendar.read.getcurrentday:
    enabled: false
