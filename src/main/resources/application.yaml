server:
  port: 3775
spring:
  application:
    name: heroesofddd
  docker:
    compose:
      enabled: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:6555/heroes_db
    username: heroes_user
    password: heroes_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
  use-fqn: true

cors:
  allowed-origin-patterns:
    - "*"
  # To restrict to specific origins, replace "*" with your frontend URLs:
  # allowed-origin-patterns:
  #   - "http://localhost:5173"
  #   - "https://yourdomain.com"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

axon:
  axonserver:
    context: default
    enabled: ${AXON_AXONSERVER_ENABLED:false}

# Feature flags - allows you to enable/disable certain slices

slices:
  creaturerecruitment.write.builddwelling:
    enabled: true
  creaturerecruitment.write.increaseavailablecreatures:
    enabled: true
  creaturerecruitment.write.recruitcreature:
    enabled: true
  creaturerecruitment.read.getalldwellings:
    enabled: true
  creaturerecruitment.read.getdwellingbyid:
    enabled: true
  astrologers.write.proclaimweeksymbol:
    enabled: true
  astrologers.automation.whenweekstartedthenproclaimweeksymbol:
    enabled: true
  astrologers.automation.whenweeksymbolproclaimedthenincreasedwellingavailablecreatures:
    enabled: true
  calendar.write.startday:
    enabled: true
  calendar.write.finishday:
    enabled: true
  armies.write.removecreaturefromarmy:
    enabled: true
  armies.write.addcreaturetoarmy:
    enabled: true
  armies.read.getarmycreatures:
    enabled: true
  astrologers.read.getweeksymbol:
    enabled: true
  calendar.read.viewcurrentday:
    enabled: true